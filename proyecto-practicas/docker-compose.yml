# version: '3'

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "npm run build && npm run start"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - db
      - backend  
    environment:
      BACKEND_API_URL: http://localhost:4000/api
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=beebit
      - DATABASE_PASSWORD=esp93w5438
      - DATABASE_NAME=beebit
    ports:
      - "4000:4000" 
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: beebit
      POSTGRES_PASSWORD: esp93w5438
      POSTGRES_NAME: beebit
    ports:
      - "5432:5432"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
